<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>0xFRAG</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500&display=swap" rel="stylesheet">
    <link rel="preload" href="/fonts/MicroExtendFLF-Bold.ttf" as="font" type="font/ttf" crossorigin>
    <link rel="stylesheet" href="/src/style.css">
</head>
<body>
    <nav class="topbar">
        <h1>0xFRAG</h1>
    </nav>
    <div class="container">
        <!-- Login via browser -->
        <div id="step-login" hidden>
            <button id="btn-login">Login via Browser</button>
        </div>

        <!-- Account selector -->
        <div id="step-accounts" hidden>
            <div id="account-list"></div>
            <button id="btn-add-account">Add Account</button>
        </div>

        <!-- Authenticated -->
        <div id="step-authenticated" hidden>
            <table class="account-info">
                <tr><td class="label">Account name</td><td id="display-username" class="no-transform"></td></tr>
                <tr><td class="label">Account ID</td><td id="display-user-id"></td></tr>
                <tr><td class="label">Wallet address</td><td id="display-user-wallet"></td></tr>
            </table>
            <div class="action-buttons">
                <button id="btn-back">Back</button>
                <button id="btn-logout">Logout</button>
                <button id="btn-play">Play</button>
            </div>
        </div>

        <p id="status" class="status"></p>
    </div>

    <div id="game-container" hidden></div>

    <script type="module" src="/src/app.js"></script>
</body>
</html>
